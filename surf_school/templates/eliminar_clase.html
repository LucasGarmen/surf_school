{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Excluir aula | SurfClass</title>
    <link rel="stylesheet" href="{% static 'css/main.css' %}">
</head>
<body>
    <main class="page">
        <div class="container page-narrow">
            <section class="form-card">
                <h1>Excluir aula</h1>
                <p class="confirm-text">Tem certeza de que deseja excluir esta aula?</p>

                <div class="info-list">
                    <p><strong>Data:</strong> {{ clase.fecha }}</p>
                    <p><strong>Horário:</strong> {{ clase.get_turno_display }}</p>
                    <p><strong>Nível:</strong> {{ clase.get_nivel_display }}</p>
                </div>

                <form method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn-danger">Sim, excluir</button>
                </form>

                <div class="footer-links">
                    <a class="text-link" href="{% url 'clases' %}">Cancelar e voltar</a>
                </div>
            </section>
        </div>
    </main>
</body>
</html>
