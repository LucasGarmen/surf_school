{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar aula | SurfClass</title>
    <link rel="stylesheet" href="{% static 'css/main.css' %}">
</head>
<body>
    <main class="page">
        <div class="container page-narrow">
            <section class="form-card">
                <h1>Criar nova aula</h1>
                <p class="subtitle">Cadastre um novo horário de aula.</p>

                <form method="post">
                    {% csrf_token %}

                    <div>
                        <label for="fecha">Data</label>
                        <input type="date" name="fecha" id="fecha" value="{{ form_data.fecha|default:'' }}" required>
                    </div>

                    <div>
                        <label for="turno">Horário</label>
                        <select name="turno" id="turno" required>
                            <option value="">Selecione um horário</option>
                            {% for valor, texto in turnos %}
                                <option value="{{ valor }}" {% if form_data.turno == valor %}selected{% endif %}>{{ texto }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div>
                        <label for="cupo_maximo">Capacidade máxima</label>
                        <input type="number" name="cupo_maximo" id="cupo_maximo" value="{{ form_data.cupo_maximo|default:'5' }}" min="1" required>
                    </div>

                    <div>
                        <label for="nivel">Nível</label>
                        <select name="nivel" id="nivel" required>
                            <option value="">Selecione um nível</option>
                            {% for valor, texto in niveles %}
                                <option value="{{ valor }}" {% if form_data.nivel == valor %}selected{% endif %}>{{ texto }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    {% if error %}
                        <p class="error-text">{{ error }}</p>
                    {% endif %}

                    <button type="submit">Criar aula</button>
                </form>

                <div class="footer-links">
                    <a class="text-link" href="{% url 'clases' %}">Voltar para aulas</a>
                </div>
            </section>
        </div>
    </main>
</body>
</html>
