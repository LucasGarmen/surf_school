{% extends 'base.html' %}

{% block title %}Alterar senha | SurfClass{% endblock %}
{% block container_class %}page-narrow{% endblock %}

{% block content %}
<section class="form-card">
    <h1>Alterar senha</h1>
    <p class="subtitle">Use uma senha forte e fácil de lembrar.</p>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Atualizar senha</button>
    </form>

    <div class="footer-links">
        <a class="text-link" href="{% url 'editar_perfil' %}">Voltar para o perfil</a>
    </div>
</section>
{% endblock %}
